<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault OS - Escape Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.414.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .emerald-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #10b981;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [activeView, setActiveView] = useState('protocol'); 
            const [activeDay, setActiveDay] = useState(1);
            const [freedomGoal, setFreedomGoal] = useState(5000);
            const [productPrice, setProductPrice] = useState(47); 
            const [copiedId, setCopiedId] = useState(null);

            const copyToClipboard = (text, id) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            const prompts = [
                { id: 'p1', title: "The 'Karen' De-escalator", desc: "Turn toxic verbal abuse into a compliant, closed ticket.", text: "Act as a high-level customer retention expert. Below is a transcript of an angry customer. Generate a 3-sentence response that: 1. Validates their frustration without admitting legal fault. 2. Offers a clear next step. 3. Uses 'de-escalation' language to lower their heart rate. [PASTE TRANSCRIPT HERE]" },
                { id: 'p2', title: "The 30-Second CRM Summary", desc: "Instantly turn a rambling call into professional notes.", text: "Summarize this call transcript into 4 bullet points for a CRM: 1. Subject of call. 2. Customer Sentiment. 3. Resolution offered. 4. Required Follow-up date. Keep it under 50 words. [PASTE TRANSCRIPT HERE]" },
                { id: 'p3', title: "The Objection Killer", desc: "Counter rejections like 'bad credit' or 'no money down' with logic.", text: "I am a BDC setter for a car dealership. The customer says [OBJECTION]. Write a 2-sentence pattern interrupt that acknowledges the problem but moves them toward an appointment. Tone: Empathetic but firm." },
                { id: 'p4', title: "The Email Ghostwriter", desc: "Convert a missed call into a high-open rate follow-up.", text: "Write a short, 3-line email for a prospect I just missed. Make it sound human, not corporate. Mention that I have a 'potential solution for their specific credit situation' to spark curiosity." }
            ];

            const days = [
                { id: 1, title: "The Portal Shift", subtitle: "The 4-Hour Match", icon: "target", content: "Stop acting like a clock-watcher. You are an athlete in a jersey you hate. Condense your 8-hour shift into 4 hours of pure intensity. The match ends at 1 PM. No distractions.", action: "Set a physical timer. Run 90-minute 'Sprints' with 10-minute breaks.", quote: "Listen, Morty. Your job is a simulation designed to drain your soul. We're portaling out." },
                { id: 2, title: "Meeseeks Box", subtitle: "AI Grunt Work", icon: "cpu", content: "Typing call notes manually is for Jerrys. Use the PROMPT VAULT to handle the summaries, the email follow-ups, and the repetitive scripts.", action: "Open the Prompt Vault tab. Use the CRM Summary prompt for every single call today.", quote: "Existence is pain for a Meeseeks. Let the AI do the work." },
                { id: 3, title: "The Third Half", subtitle: "Addiction Audit", icon: "coffee", content: "The 'Third Half' is the reward. You don't smoke, you don't watch Rick and Morty, and you don't scroll until the 4-hour 'Match' is won.", action: "Strict Rule: 25 successful calls/tickets = 1 reward.", quote: "Wubba Lubba Dub Dub. Money is the help." },
                { id: 4, title: "The Council of Ricks", subtitle: "Problem Inventory", icon: "shield-alert", content: "Every customer complaint is a data point. Collect the 10 most common ways people yell at you. This is your product inventory.", action: "Write down the 10 most painful problems you solve daily.", quote: "Every call center has a vat of toxic customers. Use them to grow." },
                { id: 5, title: "The Bridge", subtitle: "The Digital Heist", icon: "file-text", content: "Turn your 'Problem Bible' from Day 4 into a $7-$47 PDF. Millions of people are currently wearing headsets and they are desperate for this.", action: "Outline your first 'Survival Guide.' What are the 3 secrets you know?", quote: "I turned myself into a digital product, Morty!" },
                { id: 6, title: "The Micro-Purge", subtitle: "Rage Focus", icon: "flame", content: "Call centers make you soft and stagnant. 15 minutes of high-intensity movement after your shift. Sweat out the 'Karen' energy.", action: "15 minutes of sprints, shadow boxing, or heavy lifting.", quote: "Scientific fact: Rage is better than cardio." },
                { id: 7, title: "The New Reality", subtitle: "The Final Portal", icon: "log-out", content: "Upload your asset. Set the price. Promote it to the millions trapped in headsets across the globe. You are no longer a worker.", action: "Hit 'Publish' on your Gumroad/Whop store.", quote: "To live is to risk it all." }
            ];

            const salesNeeded = Math.ceil(freedomGoal / productPrice);

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 font-sans pb-20">
                    <header className="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-emerald-500 p-1.5 rounded-lg text-slate-950">
                                    <Icon name="zap" className="w-6 h-6 fill-current" />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight uppercase italic">Vault <span className="text-emerald-500 font-mono">OS</span></h1>
                            </div>
                            <div className="flex gap-2 bg-slate-950 p-1 rounded-xl border border-slate-800">
                                <button onClick={() => setActiveView('protocol')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeView === 'protocol' ? 'bg-emerald-500 text-slate-950 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'text-slate-500 hover:text-slate-300'}`}>PROTOCOL</button>
                                <button onClick={() => setActiveView('vault')} className={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${activeView === 'vault' ? 'bg-emerald-500 text-slate-950 shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'text-slate-500 hover:text-slate-300'}`}>PROMPT VAULT</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 py-12">
                        <section className="mb-16 text-center">
                            <div className="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-4 py-1 rounded-full mb-6">
                                <Icon name="rocket" className="w-4 h-4 text-emerald-500" />
                                <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest italic font-mono">Full Access Enabled</span>
                            </div>
                            <h2 className="text-5xl md:text-7xl font-black mb-6 bg-gradient-to-r from-white via-emerald-400 to-emerald-600 bg-clip-text text-transparent italic tracking-tighter uppercase">Rage to Riches</h2>
                            <p className="text-slate-400 text-lg max-w-2xl mx-auto">The 7-day blueprint to automate your work and build your $10k/month escape portal.</p>
                        </section>

                        {activeView === 'protocol' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-4 space-y-3">
                                    {days.map((day) => (
                                        <button key={day.id} onClick={() => setActiveDay(day.id)} className={`w-full text-left p-4 rounded-xl border transition-all duration-200 flex items-center justify-between ${activeDay === day.id ? 'bg-emerald-500/10 border-emerald-500 shadow-lg' : 'bg-slate-900 border-slate-800 hover:border-slate-700'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className={`p-2 rounded-lg ${activeDay === day.id ? 'bg-emerald-500 text-slate-950' : 'bg-slate-800 text-slate-400'}`}>
                                                    <Icon name={day.icon} className="w-5 h-5" />
                                                </div>
                                                <div>
                                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Step {day.id}</p>
                                                    <p className={`font-bold text-sm ${activeDay === day.id ? 'text-white' : 'text-slate-400'}`}>{day.title}</p>
                                                </div>
                                            </div>
                                            <Icon name="chevron-right" className={`w-4 h-4 ${activeDay === day.id ? 'text-emerald-500' : 'text-slate-700'}`} />
                                        </button>
                                    ))}
                                </div>
                                <div className="lg:col-span-8">
                                    <div className="bg-slate-900 border border-slate-800 rounded-2xl p-10 min-h-[500px] relative flex flex-col">
                                        <h3 className="text-4xl font-black mb-2 uppercase italic text-white tracking-tight">{days[activeDay-1].subtitle}</h3>
                                        <p className="text-emerald-500 font-mono mb-10 italic text-sm">"{days[activeDay-1].quote}"</p>
                                        <div className="space-y-8 text-slate-300 text-lg mb-10">
                                            <p>{days[activeDay-1].content}</p>
                                            <div className="bg-slate-950/50 border border-slate-800 p-8 rounded-xl relative">
                                                <div className="absolute top-0 left-0 w-1 h-full bg-emerald-500 rounded-l-xl"></div>
                                                <h4 className="text-white font-bold mb-4 uppercase tracking-widest text-xs flex items-center gap-2">
                                                    <Icon name="terminal" className="w-4 h-4 text-emerald-500" /> Required Action:
                                                </h4>
                                                <p className="text-emerald-400/90 font-mono text-sm leading-relaxed">
                                                    {days[activeDay-1].action}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 gap-6">
                                {prompts.map((p) => (
                                    <div key={p.id} className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6 relative group">
                                        <div className="flex justify-between items-start mb-4 relative z-10">
                                            <div>
                                                <h4 className="text-xl font-bold text-white mb-1 italic underline decoration-emerald-500/30">{p.title}</h4>
                                                <p className="text-xs text-slate-500 uppercase tracking-widest">{p.desc}</p>
                                            </div>
                                            <button onClick={() => copyToClipboard(p.text, p.id)} className={`p-3 rounded-xl transition-all ${copiedId === p.id ? 'bg-emerald-500 text-slate-950 shadow-lg' : 'bg-slate-950 border border-slate-800 text-slate-400 hover:text-emerald-400'}`}>
                                                <Icon name={copiedId === p.id ? "check-circle-2" : "copy"} className="w-5 h-5" />
                                            </button>
                                        </div>
                                        <div className="bg-black/40 p-5 rounded-xl font-mono text-xs text-slate-400 border border-slate-800/50 relative z-10">{p.text}</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        <div className="mt-16 bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-10 shadow-2xl">
                            <div className="flex items-center gap-3 mb-10">
                                <Icon name="dribbble" className="w-6 h-6 text-emerald-500" />
                                <h3 className="text-2xl font-black uppercase italic text-white tracking-tighter">Freedom Calculator</h3>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                <div>
                                    <label className="block text-xs font-mono text-slate-500 mb-8 uppercase font-bold tracking-widest">MONTHLY TARGET INCOME ($)</label>
                                    <input type="range" min="1000" max="20000" step="500" value={freedomGoal} onChange={(e) => setFreedomGoal(Number(e.target.value))} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                    <div className="mt-6 text-5xl font-black text-white italic tracking-tighter">${freedomGoal.toLocaleString()}</div>
                                </div>
                                <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-10 text-center relative overflow-hidden">
                                    <p className="text-slate-500 text-[10px] mb-3 uppercase font-mono font-bold tracking-widest italic text-white">SALES REQUIRED (AT $47 ASSET)</p>
                                    <p className="text-7xl font-black text-emerald-500 tracking-tighter italic">{salesNeeded}</p>
                                    <p className="text-[10px] text-slate-500 mt-6 uppercase tracking-tighter italic font-medium text-white">MATCH YOUR $1,350 SALARY WITH JUST {Math.ceil(1350/47)} SALES.</p>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
